function GlobeCanvas(){const ref=useRef(null);useEffect(()=>{const c=ref.current;if(!c)return;const ctx=c.getContext("2d");const W=460,H=340;c.width=W*2;c.height=H*2;ctx.scale(2,2);let rot=-95,geo=null,raf,pa=false;const onV=()=>{pa=document.hidden;if(!pa)raf=requestAnimationFrame(draw);};document.addEventListener("visibilitychange",onV);fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(r=>r.json()).then(data=>{const tf=(topo,obj)=>{const arcs=topo.arcs;const da=i=>{const rev=i<0;const idx=rev?~i:i;const arc=arcs[idx];const co=[];let x=0,y=0;arc.forEach(([dx,dy])=>{x+=dx;y+=dy;co.push([x*topo.transform.scale[0]+topo.transform.translate[0],y*topo.transform.scale[1]+topo.transform.translate[1]]);});return rev?co.reverse():co;};const dr=ring=>ring.reduce((a,i)=>a.concat(da(i)),[]);return{type:"FeatureCollection",features:obj.geometries.map(g=>({type:"Feature",geometry:{type:g.type,coordinates:g.type==="Polygon"?g.arcs.map(dr):g.type==="MultiPolygon"?g.arcs.map(pp=>pp.map(dr)):[]}}))};};geo=tf(data,data.objects.countries);draw();}).catch(()=>draw());const proj=(lon,lat,r)=>{const la=(lon+r)*Math.PI/180;const ph=lat*Math.PI/180;const x=Math.cos(ph)*Math.sin(la);const y=Math.sin(ph);const z=Math.cos(ph)*Math.cos(la);if(z<0)return null;return{x:W/2+x*148,y:H/2-y*148};};const dp=(ring,r)=>{const pts=ring.map(([lo,la])=>proj(lo,la,r)).filter(Boolean);if(pts.length<3)return;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath();ctx.fillStyle="rgba(15,81,50,0.15)";ctx.fill();ctx.strokeStyle="rgba(15,81,50,0.3)";ctx.lineWidth=0.5;ctx.stroke();};const draw=()=>{if(pa)return;ctx.clearRect(0,0,W,H);ctx.beginPath();ctx.arc(W/2,H/2,148,0,Math.PI*2);ctx.fillStyle="#E8F0EB";ctx.fill();ctx.strokeStyle="#D5DFD8";ctx.lineWidth=1;ctx.stroke();if(geo)geo.features.forEach(f=>{if(f.geometry.type==="Polygon")f.geometry.coordinates.forEach(r=>dp(r,rot));else if(f.geometry.type==="MultiPolygon")f.geometry.coordinates.forEach(pp=>pp.forEach(r=>dp(r,rot)));});INSTALLATIONS.forEach(inst=>{const pt=proj(inst.lon,inst.lat,rot);if(!pt)return;const sz=Math.min(2+inst.count*0.012,8);ctx.beginPath();ctx.arc(pt.x,pt.y,sz,0,Math.PI*2);ctx.fillStyle=inst.count>50?"#0BAFBF":"#FF6B35";ctx.fill();});rot+=0.15;raf=requestAnimationFrame(draw);};draw();return()=>{cancelAnimationFrame(raf);document.removeEventListener("visibilitychange",onV);};},[]);return<div style={{position:"relative",maxWidth:"100%"}}><canvas ref={ref} style={{width:"100%",maxWidth:460,height:"auto",aspectRatio:"460/340"}}/></div>;}
